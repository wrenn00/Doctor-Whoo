<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>닥터후 팡팡 @13doctorwhooo - 맞팔해주세요!</title>
  <meta name="description" content="@13doctorwhooo 닥터후님 궁디팡팡! 맞팔맞팔 아자스!! 💖" />
  <meta name="theme-color" content="#f91880" />
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="닥터후 팡팡 - @13doctorwhooo 맞팔해주세요! 💖" />
  <meta property="og:description" content="@13doctorwhooo 님을 팡팡! 잘했어요 / 혼내기 모드로 응원해요 😡" />
  <meta property="og:image"       content="hoo.png" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="닥터후 팡팡 - @13doctorwhooo 맞팔해주세요!" />
  <meta name="twitter:description" content="@13doctorwhooo 님을 팡팡! 맞팔맞팔 아자스!!" />
  <meta name="twitter:image"       content="hoo.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #fefefe;
      --card:     #ffffff;
      --accent:   #f91880;
      --accent2:  #f4212e;
      --text:     #14171a;
      --sub:      #657786;
      --border:   #e1e8ed;
      --praise:   #f91880;
      --scold:    #f4212e;
    }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle, #e1e8ed 1px, transparent 1px);
      background-size: 28px 28px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 56px;
      touch-action: manipulation;
      color: var(--text);
      transition: background-color 0.4s;
    }
    body.mode-scold { --bg: #fff5f5; }
    body.rage-3     { --bg: #ffe8e8; }
    body.rage-max   { --bg: #ffcfcf; }

    /* ── Profile card header ───────────────────────── */
    .profile-card {
      width: 100%; max-width: 600px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 18px;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    .profile-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid var(--border);
      overflow: hidden; flex-shrink: 0;
      background: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
    }
    .profile-avatar img { width:100%; height:100%; object-fit:cover; }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 1rem; font-weight: 800; color: var(--text);
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .profile-handle {
      font-size: .82rem; color: var(--sub); margin-top: 1px;
    }
    .profile-handle a { color: var(--sub); text-decoration: none; }
    .profile-handle a:hover { color: var(--accent); text-decoration: underline; }
    .profile-stats {
      display: flex; gap: 16px; margin-top: 8px;
    }
    .profile-stat { font-size: .78rem; color: var(--sub); }
    .profile-stat strong { color: var(--text); font-weight: 700; }
    .profile-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-follow {
      padding: 7px 18px; background: var(--text); color: #fff;
      border: none; border-radius: 50px; font-family: inherit;
      font-size: .82rem; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .btn-follow:hover { opacity: .85; }
    .btn-dm {
      padding: 7px 14px; background: transparent; color: var(--text);
      border: 1.5px solid var(--border); border-radius: 50px; font-family: inherit;
      font-size: .82rem; font-weight: 700; cursor: pointer;
      transition: background .15s;
      touch-action: manipulation;
    }
    .btn-dm:hover { background: var(--border); }

    /* ── Mode tabs ─────────────────────────────────── */
    .mode-tabs {
      width: 100%; max-width: 600px;
      display: flex;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 18px;
      background: var(--card);
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .mode-tab {
      flex: 1; padding: 13px 8px;
      background: transparent; border: none;
      font-family: inherit; font-size: .88rem; font-weight: 700;
      color: var(--sub); cursor: pointer;
      position: relative; text-align: center;
      transition: color .2s, background .2s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .mode-tab:first-child { border-right: 1px solid var(--border); }
    .mode-tab .tab-label { display: block; font-size: .7rem; font-weight: 600; margin-top: 2px; opacity: .7; }
    .mode-tab::after {
      content: ''; position: absolute; bottom: 0; left: 16%; right: 16%; height: 3px;
      border-radius: 3px 3px 0 0;
      background: transparent; transition: background .2s;
    }
    .mode-tab.active { color: var(--text); }
    .mode-tab.praise.active { color: var(--praise); }
    .mode-tab.praise.active::after { background: var(--praise); }
    .mode-tab.scold.active  { color: var(--scold);  }
    .mode-tab.scold.active::after  { background: var(--scold); }

    /* ── Main layout ───────────────────────────────── */
    .main-area {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
      width: 100%;
      max-width: 600px;
    }

    /* ── Stat cards ────────────────────────────────── */
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      min-width: 88px; flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .stat-card-label {
      font-size: .62rem; font-weight: 700; color: var(--sub);
      letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .stat-card-value {
      font-size: 1.65rem; font-weight: 800;
      font-family: 'SF Mono', 'Monaco', 'Cascadia Code', 'Noto Sans KR', monospace;
      color: var(--text); line-height: 1;
      letter-spacing: -1px;
    }
    .stat-card-value.praise { color: var(--praise); }
    .stat-card-value.scold  { color: var(--scold);  }
    .stat-card-bump {
      font-size: .6rem; font-weight: 600; color: var(--sub);
      margin-top: 4px; min-height: 14px;
      transition: opacity .3s;
    }
    .stat-card-bump.visible { color: #17bf63; }

    /* ── Image column ──────────────────────────────── */
    .image-col {
      display: flex; flex-direction: column;
      align-items: stretch; flex: 1; gap: 10px; min-width: 0;
    }

    /* ── Gauge ─────────────────────────────────────── */
    .gauge-header {
      display: flex; justify-content: space-between; align-items: center;
    }
    .gauge-title { font-size: .72rem; font-weight: 700; color: var(--sub); }
    .gauge-count { font-size: .72rem; font-weight: 700; color: var(--sub);
      font-family: 'SF Mono', monospace; }
    .gauge-track {
      width: 100%; height: 6px;
      background: var(--border); border-radius: 999px; overflow: hidden;
    }
    .gauge-fill {
      height: 100%; width: 0%; border-radius: 999px;
      background: var(--praise);
      transition: width .4s ease, background .5s;
    }
    .gauge-next {
      font-size: .62rem; color: var(--sub); text-align: right;
    }

    /* ── SNS post card (image frame) ───────────────── */
    .post-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
    }
    .post-card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .post-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      overflow: hidden; background: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .post-avatar img { width:100%; height:100%; object-fit:cover; }
    .post-handle { font-size: .8rem; font-weight: 700; color: var(--text); }
    .post-handle span { color: var(--sub); font-weight: 400; }

    .image-frame {
      width: 100%; aspect-ratio: 3 / 4;
      background: #f7f7f7;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: filter .3s; user-select: none;
    }
    .image-frame img {
      width:100%; height:100%; object-fit:contain; display:block;
      pointer-events:none; user-select:none; -webkit-user-drag:none;
    }
    .image-frame .placeholder { font-size:4rem; opacity:.3; pointer-events:none; }

    /* rage states */
    .image-frame.rage-1 { filter: drop-shadow(0 0 6px rgba(255,68,68,.4)); }
    .image-frame.rage-2 { filter: drop-shadow(0 0 12px rgba(255,40,40,.6)); }
    .image-frame.rage-3 { filter: drop-shadow(0 0 20px rgba(200,0,0,.7)); }
    .image-frame.rage-max {
      filter: drop-shadow(0 0 28px rgba(180,0,0,.85));
      animation: frameShudder .12s infinite alternate;
    }
    .image-frame.faint { animation: faintTilt 1s ease forwards; }
    @keyframes frameShudder { from { transform:translateX(-2px); } to { transform:translateX(2px); } }
    @keyframes faintTilt {
      0%  { transform:rotate(0); }
      30% { transform:rotate(-6deg) scale(.97); }
      60% { transform:rotate(4deg) scale(.96); }
      100%{ transform:rotate(-3deg) scale(.95); }
    }

    /* post footer */
    .post-card-footer {
      display: flex; align-items: center; gap: 18px;
      padding: 10px 14px; border-top: 1px solid var(--border);
    }
    .post-action {
      display: flex; align-items: center; gap: 5px;
      font-size: .78rem; color: var(--sub); font-weight: 600;
      cursor: default; user-select: none;
    }
    .post-action.praise-action { color: var(--praise); }
    .post-action.scold-action  { color: var(--scold);  }

    /* ── Effect overlay ────────────────────────────── */
    .effect-overlay {
      position:absolute; inset:0; pointer-events:none;
      display:flex; align-items:center; justify-content:center;
      font-size:3rem; opacity:0;
    }
    .effect-overlay.show { animation: popfade .55s ease forwards; }
    @keyframes popfade {
      0%  { opacity:0; transform:scale(.5); }
      30% { opacity:1; transform:scale(1.2); }
      70% { opacity:1; transform:scale(1); }
      100%{ opacity:0; transform:scale(1.1); }
    }

    /* ── Shake / squash animations ─────────────────── */
    @keyframes shake-normal {
      0%,100%{ transform:translateX(0) scaleX(1) scaleY(1); }
      10%    { transform:translateX(0) scaleX(1.03) scaleY(.97); }
      25%    { transform:translateX(-8px) rotate(-1deg); }
      50%    { transform:translateX(8px) rotate(1deg); }
      70%    { transform:translateX(-4px) rotate(-.5deg); }
      85%    { transform:translateX(4px) rotate(.5deg); }
    }
    @keyframes shake-scold {
      0%,100%{ transform:translateX(0); }
      8%     { transform:translateX(0) scaleX(1.06) scaleY(.94); }
      22%    { transform:translateX(-15px) rotate(-2deg); }
      44%    { transform:translateX(15px) rotate(2deg); }
      62%    { transform:translateX(-8px) rotate(-1deg); }
      78%    { transform:translateX(8px) rotate(1deg); }
      90%    { transform:translateX(-3px); }
    }
    @keyframes squash {
      0%  { transform:scale(1,1); }
      30% { transform:scale(1.05,.95); }
      60% { transform:scale(.97,1.03); }
      100%{ transform:scale(1,1); }
    }
    .image-frame.anim-shake-normal { animation:shake-normal .4s cubic-bezier(.34,1.56,.64,1) forwards; }
    .image-frame.anim-shake-scold  { animation:shake-scold  .5s cubic-bezier(.34,1.56,.64,1) forwards; }
    .image-frame.anim-squash       { animation:squash        .3s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* ── Click ripple & hand ───────────────────────── */
    .click-ripple {
      position:absolute; width:100px; height:100px; border-radius:50%;
      pointer-events:none; animation:rippleOut .6s ease-out forwards;
    }
    @keyframes rippleOut {
      0%  { transform:translate(-50%,-50%) scale(0);   opacity:.9; }
      60% { transform:translate(-50%,-50%) scale(1);   opacity:.55; }
      100%{ transform:translate(-50%,-50%) scale(1.4); opacity:0; }
    }
    .click-hand {
      position:absolute; font-size:2rem; pointer-events:none;
      animation:handPop .3s ease forwards; z-index:10;
    }
    @keyframes handPop {
      0%  { opacity:0; transform:translate(-50%,-50%) scale(.4); }
      40% { opacity:1; transform:translate(-50%,-50%) scale(1.3); }
      70% { opacity:1; transform:translate(-50%,-50%) scale(1); }
      100%{ opacity:0; transform:translate(-50%,-50%) scale(.9); }
    }

    /* ── Impact particles ──────────────────────────── */
    .impact-particle {
      position:absolute; font-size:1.2rem; pointer-events:none;
      z-index:20; animation:impactFly .5s ease-out forwards;
    }
    @keyframes impactFly {
      0%  { opacity:1; transform:translate(0,0) scale(1); }
      100%{ opacity:0; transform:var(--fly-to); }
    }

    /* ── Screen flash ──────────────────────────────── */
    .flash { position:fixed; inset:0; pointer-events:none; opacity:0; z-index:99; }
    .flash.pop { animation:flashpop .28s ease forwards; }
    @keyframes flashpop { 0%{ opacity:.3; } 100%{ opacity:0; } }

    /* ── Floating emojis ───────────────────────────── */
    .floating-emojis { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
    .emoji-particle {
      position:absolute; font-size:1.5rem; pointer-events:none;
      animation:floatUp 1.1s ease-out forwards;
    }
    @keyframes floatUp {
      0%  { opacity:1; transform:translateY(0) scale(1); }
      100%{ opacity:0; transform:translateY(-160px) scale(.6); }
    }

    /* ── Chat bubble ───────────────────────────────── */
    .speech-bubble {
      position:fixed; background:#fff; padding:10px 16px;
      font-family:inherit; font-size:.86rem; font-weight:700;
      white-space:nowrap; pointer-events:none; z-index:9999;
      box-shadow:0 4px 20px rgba(0,0,0,.14);
      transform:translateX(-50%);
      animation:bubbleFloat 1.2s ease-out forwards;
      border-radius: 18px 18px 18px 4px;
      border: 1.5px solid var(--border);
    }
    .speech-bubble::after {
      content:''; position:absolute; bottom:-9px; left:14px;
      border-width:9px 8px 0 0; border-style:solid;
      border-top-color: var(--border);
      border-right-color: transparent;
    }
    .speech-bubble::before {
      content:''; position:absolute; bottom:-7px; left:15px;
      border-width:8px 7px 0 0; border-style:solid;
      border-right-color: transparent; z-index:1;
    }
    .speech-bubble.praise-bubble {
      color: var(--praise); background:#fff0f6;
      border-color: #fcc8df;
    }
    .speech-bubble.praise-bubble::before { border-top-color:#fff0f6; }
    .speech-bubble.praise-bubble::after  { border-top-color:#fcc8df; }
    .speech-bubble.angry-bubble {
      color: var(--scold); background:#fff0f0;
      border-color: #ffc0c0;
    }
    .speech-bubble.angry-bubble::before { border-top-color:#fff0f0; }
    .speech-bubble.angry-bubble::after  { border-top-color:#ffc0c0; }
    @keyframes bubbleFloat {
      0%  { opacity:0; transform:translateX(-50%) translateY(0) scale(.7); }
      15% { opacity:1; transform:translateX(-50%) translateY(-12px) scale(1.04); }
      30% { opacity:1; transform:translateX(-50%) translateY(-16px) scale(1); }
      80% { opacity:1; transform:translateX(-50%) translateY(-60px) scale(1); }
      100%{ opacity:0; transform:translateX(-50%) translateY(-80px) scale(.9); }
    }

    /* ── Reset (text link style) ───────────────────── */
    .reset-link {
      margin-top: 20px;
      background: none; border: none;
      font-family: inherit; font-size: .82rem; font-weight: 600;
      color: var(--sub); cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    .reset-link:hover { color: var(--text); }

    /* ── Message editor ────────────────────────────── */
    :root {
      --c-card-bg: #fff0f6; --c-card-border: #fcc8df;
      --c-num: var(--praise); --c-input-border: #fcc8df; --c-input-focus: var(--praise);
      --c-del-hover: var(--praise); --c-del-bg: #ffe8f2;
      --c-add-border: #fcc8df; --c-add-text: var(--praise);
      --c-hint: #c05080; --c-tab-grad: var(--praise);
    }
    .editor-body.tab-angry {
      --c-card-bg: #fff0f0; --c-card-border: #ffc0c0;
      --c-num: var(--scold); --c-input-border: #ffc0c0; --c-input-focus: var(--scold);
      --c-del-hover: var(--scold); --c-del-bg: #ffdddd;
      --c-add-border: #ffc0c0; --c-add-text: var(--scold);
      --c-hint: #c03040; --c-tab-grad: var(--scold);
    }

    .editor-wrap { width:100%; max-width:600px; margin-top:18px; }
    .editor-toggle {
      display:block; width:100%; padding:10px 18px;
      background: var(--card); border:1.5px solid var(--border); border-radius:12px;
      font-family:inherit; font-size:.88rem; font-weight:700; color:var(--sub);
      cursor:pointer; text-align:center;
      box-shadow:0 1px 4px rgba(0,0,0,.06);
      touch-action:manipulation; transition:all .2s;
    }
    .editor-toggle:hover { background:#f7f9fa; }
    .editor-body {
      display:none; margin-top:8px; background:var(--card);
      border:1.5px solid var(--border); border-radius:14px;
      padding:16px; box-shadow:0 2px 12px rgba(0,0,0,.07);
    }
    .editor-body.open { display:block; }

    .editor-tabs { display:flex; gap:6px; margin-bottom:14px; }
    .editor-tab {
      flex:1; padding:8px 4px; background:var(--card); border:1.5px solid var(--border);
      border-radius:10px; font-family:inherit; font-size:.78rem; font-weight:700;
      color:var(--sub); cursor:pointer; transition:all .2s; touch-action:manipulation;
      text-align:center; line-height:1.3;
    }
    .editor-tab.active {
      background: var(--c-tab-grad); color:#fff; border-color:transparent;
      box-shadow:0 2px 10px rgba(0,0,0,.12);
    }
    .editor-panel { display:none; }
    .editor-panel.active { display:block; }

    .panel-hint {
      font-size:.72rem; color:var(--c-hint); margin-bottom:10px; padding:0 2px;
    }

    .msg-list { display:flex; flex-direction:column; gap:6px; min-height:10px; }
    .msg-card {
      background:var(--c-card-bg); border:1px solid var(--c-card-border);
      border-radius:10px; padding:8px 12px;
      display:flex; flex-direction:column; gap:5px;
      animation:slideDown .2s ease;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg-card-header { display:flex; align-items:center; justify-content:space-between; }
    .msg-card-num { font-size:.66rem; font-weight:700; color:var(--c-num); opacity:.85; }
    .msg-card-del {
      background:none; border:none; cursor:pointer; font-size:.95rem;
      line-height:1; padding:2px 4px; border-radius:6px; color:#ccc;
      transition:color .15s, background .15s; touch-action:manipulation;
    }
    .msg-card-del:hover { color:var(--c-del-hover); background:var(--c-del-bg); }
    .msg-card input {
      width:100%; padding:6px 10px;
      border:1.5px solid var(--c-input-border); border-radius:8px;
      font-family:inherit; font-size:.85rem; color:var(--text);
      outline:none; background:#fff; transition:border-color .18s;
    }
    .msg-card input:focus { border-color:var(--c-input-focus); }

    .msg-empty {
      text-align:center; padding:24px 16px; color:#bbb;
      font-size:.82rem; line-height:1.7;
    }
    .msg-empty .empty-icon { font-size:1.8rem; display:block; margin-bottom:8px; }

    .btn-add-msg {
      display:block; width:100%; margin-top:8px; padding:9px;
      background:#fff; border:2px dashed var(--c-add-border); border-radius:10px;
      font-family:inherit; font-size:.82rem; font-weight:700; color:var(--c-add-text);
      cursor:pointer; text-align:center; transition:all .2s; touch-action:manipulation;
    }
    .btn-add-msg:hover { background:var(--c-card-bg); }

    .editor-actions { display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }
    .btn-save, .btn-clear {
      padding:7px 16px; border-radius:50px; font-family:inherit;
      font-size:.8rem; font-weight:700; cursor:pointer; touch-action:manipulation;
      transition:all .18s;
    }
    .btn-save { background:var(--c-tab-grad); color:#fff; border:none; box-shadow:0 2px 8px rgba(0,0,0,.15); }
    .btn-save:hover { filter:brightness(1.08); }
    .btn-clear { background:#fff; border:1.5px solid var(--border); color:var(--sub); }
    .btn-clear:hover { background:#f7f9fa; }

    /* ── Toast ─────────────────────────────────────── */
    .toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--text); color:#fff;
      padding:10px 22px; border-radius:50px; font-size:.88rem; font-weight:700;
      box-shadow:0 4px 20px rgba(0,0,0,.22); pointer-events:none;
      opacity:0; transition:opacity .25s, transform .25s; z-index:300; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ══ Mobile ════════════════════════════════════ */
    @media (max-width: 600px) {
      body { padding: 16px 12px max(32px, env(safe-area-inset-bottom)); }

      .profile-card { padding: 14px 14px 12px; gap: 12px; }
      .profile-avatar { width: 48px; height: 48px; }

      .main-area {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      /* counters become a row above the post card */
      .stat-side {
        display: flex; flex-direction: row;
        gap: 10px; width: 100%;
      }
      .stat-side .stat-card { flex: 1; min-width: 0; }

      .image-col { width: 100%; }

      .stat-card-value { font-size: 1.4rem; }
    }
    @media (max-width: 380px) {
      .profile-name { font-size: .92rem; }
      .stat-card-value { font-size: 1.2rem; }
      .mode-tab { font-size: .8rem; padding: 11px 4px; }
    }
  </style>
</head>
<body>

  <!-- Profile card -->
  <div class="profile-card">
    <div class="profile-avatar">
      <img src="hoo.png" alt="닥터후" onerror="this.style.display='none';this.parentElement.textContent='🩺'" />
    </div>
    <div class="profile-info">
      <div class="profile-name">닥터후</div>
      <div class="profile-handle"><a href="https://www.instagram.com/13doctorwhooo/" target="_blank">@13doctorwhooo</a></div>
      <div class="profile-stats">
        <div class="profile-stat"><strong>999K</strong> 팔로워</div>
        <div class="profile-stat"><strong>0</strong> 맞팔</div>
      </div>
      <div class="profile-actions">
        <button class="btn-follow" id="btnFollow">팔로우 신청</button>
        <button class="btn-dm">메시지</button>
      </div>
    </div>
  </div>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="mode-tab praise active" data-mode="praise">
      💖 잘했어요
      <span class="tab-label">칭찬 모드</span>
    </button>
    <button class="mode-tab scold" data-mode="scold">
      😡 혼내기
      <span class="tab-label">분노 모드</span>
    </button>
  </div>

  <!-- Main area: stat cards + post card -->
  <div class="main-area">
    <!-- Left stat -->
    <div class="stat-side" id="statSide">
      <div class="stat-card">
        <div class="stat-card-label">TOTAL HITS</div>
        <div class="stat-card-value" id="count">0</div>
        <div class="stat-card-bump" id="countBump"></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label" id="statLabel">PRAISE</div>
        <div class="stat-card-value praise" id="statValue">0</div>
        <div class="stat-card-bump visible" id="statusText">칭찬중</div>
      </div>
    </div>

    <!-- Post card (gauge + image) -->
    <div class="image-col">
      <div class="post-card">
        <div class="post-card-header">
          <div class="post-avatar">
            <img src="hoo.png" alt="" onerror="this.style.display='none';this.parentElement.textContent='🩺'" />
          </div>
          <div class="post-handle">닥터후 <span>@13doctorwhooo</span></div>
        </div>

        <!-- Gauge inside card, above image -->
        <div style="padding:10px 14px 6px; border-bottom:1px solid var(--border);">
          <div class="gauge-header">
            <span class="gauge-title" id="gaugeLabel">칭찬해 💕</span>
            <span class="gauge-count" id="gaugeCount">0 / 100</span>
          </div>
          <div style="margin-top:5px;">
            <div class="gauge-track"><div class="gauge-fill" id="gaugeFill"></div></div>
          </div>
          <div class="gauge-next" id="gaugeNext"></div>
        </div>

        <div class="image-frame" id="imageFrame">
          <img src="hoo.png" alt="닥터후"
               onerror="this.style.display='none';document.getElementById('placeholder').style.display='block'" />
          <span class="placeholder" id="placeholder" style="display:none">🐾</span>
          <div class="effect-overlay" id="effectOverlay"></div>
        </div>

        <div class="post-card-footer">
          <div class="post-action" id="footerPraise">❤️ <span id="footerPraiseCount">0</span></div>
          <div class="post-action" id="footerScold">🤬 <span id="footerScoldCount">0</span></div>
          <div class="post-action">🔁 <span>맞팔해줘요</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Reset -->
  <button class="reset-link" id="resetBtn">⟲ 처음부터 다시</button>

  <!-- Message editor -->
  <div class="editor-wrap">
    <button class="editor-toggle" id="editorToggle">⚙️ 메시지 편집</button>
    <div class="editor-body" id="editorBody">
      <div class="editor-tabs">
        <button class="editor-tab active" data-tab="praise">💖 잘했어요</button>
        <button class="editor-tab"        data-tab="angry" >😡 혼내기</button>
      </div>

      <div class="editor-panel active" id="panel-praise">
        <p class="panel-hint"><a href="https://www.instagram.com/13doctorwhooo/" target="_blank" style="color:#f91880;font-weight:500;">@13doctorwhooo</a> 를 칭찬할 때 랜덤으로 나올 메시지예요 ✨</p>
        <div class="msg-list" id="list-praise"></div>
        <button class="btn-add-msg" data-target="praise">➕ 메시지 추가하기</button>
      </div>

      <div class="editor-panel" id="panel-angry">
        <p class="panel-hint"><a href="https://www.instagram.com/13doctorwhooo/" target="_blank" style="color:#f91880;font-weight:500;">@13doctorwhooo</a> 를 혼낼 때 랜덤으로 나올 메시지예요 🔥</p>
        <div class="msg-list" id="list-angry"></div>
        <button class="btn-add-msg" data-target="angry">➕ 메시지 추가하기</button>
      </div>

      <div class="editor-actions">
        <button class="btn-clear" id="btnClear">🗑️ 전체 삭제</button>
        <button class="btn-save"  id="btnSave" >💾 저장</button>
      </div>
    </div>
  </div>

  <footer style="text-align:center;padding:24px 16px;font-size:12px;color:#999;margin-top:32px;">
    💖 made with love for
    <a href="https://www.instagram.com/13doctorwhooo/" target="_blank"
       style="color:#f91880;text-decoration:none;font-weight:500;">@13doctorwhooo</a>
  </footer>

  <div class="floating-emojis" id="floatingEmojis"></div>
  <div class="flash" id="flash"></div>
  <div class="toast" id="toast"></div>

  <script>
    /* ── Messages ─────────────────────────────────── */
    let praiseMessages = [], angryMessages = [];

    function loadMessages() {
      try {
        const p = JSON.parse(localStorage.getItem('praiseMessages'));
        const a = JSON.parse(localStorage.getItem('angryMessages'));
        praiseMessages = Array.isArray(p) ? p : [];
        angryMessages  = Array.isArray(a) ? a : [];
      } catch(_) {}
    }
    loadMessages();

    /* ── Mode config ──────────────────────────────── */
    const modes = {
      praise: {
        emojis:          ['💖','✨','🌸','💕','⭐','🎀'],
        impactParticles: ['✨','💖','🌸','⭐'],
        flashColor:      'rgba(249,24,128,.25)',
        statLabel:       'PRAISE',
        statusText:      '칭찬중',
        overlayEmoji:    '💖',
        handEmoji:       '👋',
        rippleColor:     'radial-gradient(circle,rgba(249,24,128,.55) 0%,rgba(249,24,128,.15) 50%,transparent 70%)',
        shakeClass:      'anim-squash',
        vibrate:         50,
        soundType:       'praise',
        bubbleClass:     'praise-bubble',
        bubbleEmoji:     '💕',
        msgPool:         'praise',
        particleCount:   4,
        valueClass:      'praise',
      },
      scold: {
        emojis:          ['😡','⚡','🔥','💢','❗'],
        impactParticles: ['💥','⚡','🔥','💢','❗'],
        flashColor:      'rgba(244,33,46,.2)',
        statLabel:       'RAGE',
        statusText:      '혼내는중',
        overlayEmoji:    '😡',
        handEmoji:       '👊',
        rippleColor:     'radial-gradient(circle,rgba(244,33,46,.7) 0%,rgba(244,33,46,.2) 50%,transparent 70%)',
        shakeClass:      'anim-shake-scold',
        vibrate:         [0,100,50,100],
        soundType:       'scold',
        bubbleClass:     'angry-bubble',
        bubbleEmoji:     '😡',
        msgPool:         'angry',
        particleCount:   6,
        valueClass:      'scold',
      },
    };

    /* ── Gauge config ─────────────────────────────── */
    const praiseGauge = [
      { max:10,  label:'칭찬해 💕',    fill:'#f91880', next:'다음까지 {n}회' },
      { max:25,  label:'사랑해 💖',    fill:'#e0106a', next:'다음까지 {n}회' },
      { max:50,  label:'팬이에요 🥵✨', fill:'#c00858', next:'다음까지 {n}회' },
      { max:9999,label:'환자후 🌸💝',  fill:'#8a0040', next:'최고 단계!' },
    ];
    const scoldGauge = [
      { max:10,  label:'😊 살살~',      fill:'#ffb6c1', frame:'',         body:'',                  next:'다음까지 {n}회' },
      { max:25,  label:'😠 분노 LV.1',  fill:'#ff6622', frame:'rage-1',   body:'',                  next:'다음까지 {n}회' },
      { max:50,  label:'😡 분노 LV.2',  fill:'#dd1111', frame:'rage-2',   body:'',                  next:'다음까지 {n}회' },
      { max:75,  label:'🤬 분노 LV.3',  fill:'#880000', frame:'rage-3',   body:'mode-scold rage-3', next:'다음까지 {n}회' },
      { max:99,  label:'🔥 분노 MAX!',  fill:'#440000', frame:'rage-max', body:'mode-scold rage-max',next:'기절까지 {n}회' },
      { max:9999,label:'💀 기절!',      fill:'#111',    frame:'rage-max faint',body:'mode-scold rage-max',next:'기절!' },
    ];

    /* ── State ────────────────────────────────────── */
    let currentMode = 'praise';
    let count = 0;
    let modeCount = { praise:0, scold:0 };

    /* ── DOM refs ─────────────────────────────────── */
    const countEl     = document.getElementById('count');
    const countBump   = document.getElementById('countBump');
    const statLabel   = document.getElementById('statLabel');
    const statValue   = document.getElementById('statValue');
    const statusText  = document.getElementById('statusText');
    const frame       = document.getElementById('imageFrame');
    const overlay     = document.getElementById('effectOverlay');
    const flash       = document.getElementById('flash');
    const floatArea   = document.getElementById('floatingEmojis');
    const gaugeFill   = document.getElementById('gaugeFill');
    const gaugeLabel  = document.getElementById('gaugeLabel');
    const gaugeCount  = document.getElementById('gaugeCount');
    const gaugeNext   = document.getElementById('gaugeNext');
    const toastEl     = document.getElementById('toast');
    const fpCount     = document.getElementById('footerPraiseCount');
    const fsCount     = document.getElementById('footerScoldCount');

    /* ── Web Audio ────────────────────────────────── */
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playSound(type) {
      try {
        const ctx = getAudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        const t = ctx.currentTime;
        if (type === 'praise') {
          osc.type='sine';
          osc.frequency.setValueAtTime(440,t);
          osc.frequency.exponentialRampToValueAtTime(660,t+.12);
          gain.gain.setValueAtTime(.18,t); gain.gain.exponentialRampToValueAtTime(.001,t+.25);
          osc.start(t); osc.stop(t+.25);
        } else {
          osc.type='square';
          osc.frequency.setValueAtTime(120,t);
          osc.frequency.exponentialRampToValueAtTime(40,t+.15);
          gain.gain.setValueAtTime(.4,t); gain.gain.exponentialRampToValueAtTime(.001,t+.2);
          osc.start(t); osc.stop(t+.2);
        }
      } catch(_) {}
    }

    /* ── Gauge update ─────────────────────────────── */
    function updateGauge() {
      const n = modeCount[currentMode];
      const pct = Math.min(n, 100);
      gaugeFill.style.width = pct + '%';
      gaugeCount.textContent = n + ' / 100';

      if (currentMode === 'scold') {
        const tier = scoldGauge.find(g => n <= g.max) || scoldGauge[scoldGauge.length-1];
        gaugeLabel.textContent = tier.label;
        gaugeFill.style.background = tier.fill;
        gaugeNext.textContent = tier.next.replace('{n}', tier.max - n);

        document.body.classList.remove('rage-3','rage-max');
        frame.classList.remove('rage-1','rage-2','rage-3','rage-max','faint');
        if (tier.body)  tier.body.split(' ').forEach(c => c && document.body.classList.add(c));
        if (tier.frame) tier.frame.split(' ').forEach(c => c && frame.classList.add(c));

        if (n === 100) setTimeout(() => frame.classList.add('faint'), 100);
      } else {
        const tier = praiseGauge.find(g => n <= g.max) || praiseGauge[praiseGauge.length-1];
        gaugeLabel.textContent = tier.label;
        gaugeFill.style.background = tier.fill;
        gaugeNext.textContent = tier.next.replace('{n}', tier.max - n);
        frame.classList.remove('rage-1','rage-2','rage-3','rage-max','faint');
        document.body.classList.remove('rage-3','rage-max');
      }
    }

    /* ── Mode switching ───────────────────────────── */
    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
      document.querySelector(`.mode-tab[data-mode="${mode}"]`).classList.add('active');
      document.body.classList.remove('mode-scold','rage-3','rage-max');
      if (mode === 'scold') document.body.classList.add('mode-scold');
      frame.classList.remove('rage-1','rage-2','rage-3','rage-max','faint');

      // update stat value color class
      statValue.className = 'stat-card-value ' + modes[mode].valueClass;
      updateStatUI();
      updateGauge();
    }
    document.querySelectorAll('.mode-tab').forEach(btn => {
      btn.addEventListener('click', () => switchMode(btn.dataset.mode));
    });

    function updateStatUI() {
      const m = modes[currentMode];
      statLabel.textContent  = m.statLabel;
      statValue.textContent  = modeCount[currentMode];
      statusText.textContent = m.statusText;
      countEl.textContent    = count;
      fpCount.textContent    = modeCount.praise;
      fsCount.textContent    = modeCount.scold;
    }

    /* ── Bump animation ───────────────────────────── */
    let bumpTimeout = null;
    function showBump() {
      countBump.textContent = '↑ +1 just now';
      countBump.classList.add('visible');
      clearTimeout(bumpTimeout);
      bumpTimeout = setTimeout(() => {
        countBump.classList.remove('visible');
        countBump.textContent = '';
      }, 1200);
    }

    /* ── Interaction handler ──────────────────────── */
    function handleInteraction(clientX, clientY) {
      count++;
      modeCount[currentMode]++;
      updateStatUI();
      updateGauge();
      showBump();

      const m    = modes[currentMode];
      const rect = frame.getBoundingClientRect();
      const lx   = clientX - rect.left;
      const ly   = clientY - rect.top;

      frame.classList.remove('anim-shake-normal','anim-shake-scold','anim-squash');
      void frame.offsetWidth;
      frame.classList.add(m.shakeClass);
      frame.addEventListener('animationend', () => {
        frame.classList.remove('anim-shake-normal','anim-shake-scold','anim-squash');
      }, { once:true });

      const ripple = document.createElement('div');
      ripple.className = 'click-ripple';
      ripple.style.cssText = `left:${lx}px;top:${ly}px;background:${m.rippleColor}`;
      frame.appendChild(ripple);
      setTimeout(() => ripple.remove(), 650);

      const hand = document.createElement('span');
      hand.className = 'click-hand';
      hand.textContent = m.handEmoji;
      hand.style.cssText = `left:${lx}px;top:${ly}px`;
      frame.appendChild(hand);
      setTimeout(() => hand.remove(), 350);

      spawnImpactParticles(m.impactParticles, lx, ly, m.particleCount);

      flash.style.background = m.flashColor;
      flash.classList.remove('pop');
      void flash.offsetWidth;
      flash.classList.add('pop');

      overlay.textContent = m.overlayEmoji;
      overlay.classList.remove('show');
      void overlay.offsetWidth;
      overlay.classList.add('show');

      for (let i = 0; i < 4; i++) spawnEmoji(m.emojis, clientX, clientY);

      if (navigator.vibrate) navigator.vibrate(Array.isArray(m.vibrate) ? m.vibrate : [m.vibrate]);
      playSound(m.soundType);
      spawnBubble(m, clientX, clientY);
    }

    let lastTouchEnd = 0;
    frame.addEventListener('click', e => {
      if (Date.now() - lastTouchEnd < 350) return;
      handleInteraction(e.clientX, e.clientY);
    });
    frame.addEventListener('touchend', e => {
      e.preventDefault();
      lastTouchEnd = Date.now();
      const t = e.changedTouches[0];
      if (!t) return;
      handleInteraction(t.clientX, t.clientY);
    }, { passive:false });
    frame.addEventListener('touchstart', e => { e.preventDefault(); }, { passive:false });

    /* ── Particle helpers ─────────────────────────── */
    function spawnImpactParticles(particles, lx, ly, n) {
      for (let i = 0; i < n; i++) {
        const el = document.createElement('span');
        el.className = 'impact-particle';
        el.textContent = particles[Math.floor(Math.random() * particles.length)];
        el.style.left = lx + 'px'; el.style.top = ly + 'px';
        const angle = ((360/n)*i + (Math.random()-.5)*40) * (Math.PI/180);
        const dist  = 45 + Math.random()*40;
        el.style.setProperty('--fly-to',
          `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(.3)`);
        el.style.animationDelay = Math.random()*.07+'s';
        frame.appendChild(el);
        setTimeout(() => el.remove(), 600);
      }
    }

    function spawnEmoji(emojis, cx, cy) {
      const el = document.createElement('span');
      el.className = 'emoji-particle';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left = (cx+(Math.random()-.5)*90)+'px';
      el.style.top  = (cy+(Math.random()-.5)*50)+'px';
      el.style.animationDelay = Math.random()*.15+'s';
      floatArea.appendChild(el);
      setTimeout(() => el.remove(), 1300);
    }

    function spawnBubble(m, cx, cy) {
      const poolMap = { praise: praiseMessages, angry: angryMessages };
      const pool = poolMap[m.msgPool] || [];
      if (!pool.length) return;
      const text = pool[Math.floor(Math.random()*pool.length)];
      const el   = document.createElement('div');
      el.className = 'speech-bubble ' + m.bubbleClass;
      el.textContent = m.bubbleEmoji + ' ' + text;
      el.style.left  = cx + 'px';
      el.style.top   = (cy - 60) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1350);
    }

    /* ── Follow button ────────────────────────────── */
    document.getElementById('btnFollow').addEventListener('click', () => {
      showToast('안 받아줘요 😤');
    });

    /* ── Reset ────────────────────────────────────── */
    document.getElementById('resetBtn').addEventListener('click', () => {
      count = 0;
      modeCount = { praise:0, scold:0 };
      switchMode('praise');
    });

    /* ── Message editor ───────────────────────────── */
    let activeEditorTab = 'praise';

    const tabData = {
      praise: { get: () => praiseMessages, set: v => { praiseMessages = v; }, key: 'praiseMessages' },
      angry:  { get: () => angryMessages,  set: v => { angryMessages  = v; }, key: 'angryMessages'  },
    };

    function createCard(listEl, value, tabKey) {
      const card = document.createElement('div');
      card.className = 'msg-card';
      const header = document.createElement('div');
      header.className = 'msg-card-header';
      const num = document.createElement('span');
      num.className = 'msg-card-num';
      const del = document.createElement('button');
      del.className = 'msg-card-del';
      del.textContent = '🗑️';
      del.addEventListener('click', () => {
        card.style.transition = 'opacity .15s';
        card.style.opacity = '0';
        setTimeout(() => { card.remove(); renumberList(listEl); }, 160);
      });
      header.appendChild(num); header.appendChild(del);
      const input = document.createElement('input');
      input.type = 'text'; input.value = value;
      input.placeholder = '예: @13doctorwhooo 님 맞팔해주세여';
      card.appendChild(header); card.appendChild(input);
      listEl.appendChild(card);
      renumberList(listEl);
      return input;
    }

    function renumberList(listEl) {
      listEl.querySelectorAll('.msg-card-num').forEach((el, i) => {
        el.textContent = '💬 메시지 ' + (i + 1);
      });
    }

    function renderEmpty(listEl) {
      const el = document.createElement('div');
      el.className = 'msg-empty';
      el.innerHTML = '<span class="empty-icon">💌</span>아직 메시지가 없어요<br>아래 버튼을 눌러 추가해보세요!';
      listEl.appendChild(el);
    }

    function renderList(tabKey) {
      const listEl = document.getElementById('list-' + tabKey);
      listEl.innerHTML = '';
      const msgs = tabData[tabKey].get();
      if (!msgs.length) { renderEmpty(listEl); return; }
      msgs.forEach(msg => createCard(listEl, msg, tabKey));
    }

    function getListValues(tabKey) {
      const listEl = document.getElementById('list-' + tabKey);
      return [...listEl.querySelectorAll('.msg-card input')]
        .map(i => i.value.trim()).filter(Boolean);
    }

    document.getElementById('editorToggle').addEventListener('click', () => {
      const body = document.getElementById('editorBody');
      const open = body.classList.toggle('open');
      document.getElementById('editorToggle').textContent = open ? '⚙️ 메시지 편집 ▲' : '⚙️ 메시지 편집';
      if (open) { renderList('praise'); renderList('angry'); }
    });

    const editorBody = document.getElementById('editorBody');
    function applyEditorTabTheme(tabKey) {
      editorBody.classList.remove('tab-angry');
      if (tabKey === 'angry') editorBody.classList.add('tab-angry');
    }
    document.querySelectorAll('.editor-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.editor-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        activeEditorTab = tab.dataset.tab;
        document.getElementById('panel-' + activeEditorTab).classList.add('active');
        applyEditorTabTheme(activeEditorTab);
      });
    });

    document.querySelectorAll('.btn-add-msg').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabKey = btn.dataset.target;
        const listEl = document.getElementById('list-' + tabKey);
        const empty = listEl.querySelector('.msg-empty');
        if (empty) empty.remove();
        const input = createCard(listEl, '', tabKey);
        input.focus();
      });
    });

    document.getElementById('btnSave').addEventListener('click', () => {
      ['praise','angry'].forEach(tabKey => {
        const vals = getListValues(tabKey);
        const deduped = [...new Set(vals)];
        tabData[tabKey].set(deduped);
        localStorage.setItem(tabData[tabKey].key, JSON.stringify(deduped));
        renderList(tabKey);
      });
      showToast('저장됐어요! ✨');
    });

    document.getElementById('btnClear').addEventListener('click', () => {
      tabData[activeEditorTab].set([]);
      localStorage.removeItem(tabData[activeEditorTab].key);
      renderList(activeEditorTab);
      showToast('삭제됐어요 🗑️');
    });

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 1600);
    }

    /* ── Init ─────────────────────────────────────── */
    switchMode('praise');
  </script>
</body>
</html>
